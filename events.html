<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — Go Inspire Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="events-data.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Lato',sans-serif;background:#fff;color:#231D2D;overflow-x:hidden;}
:root{--purple-deep:#35204F;--purple-royal:#5B3B8C;--teal:#2EB8B0;--gold:#C9A227;}

nav{position:fixed;top:0;left:0;right:0;z-index:300;padding:0.9rem 2.5rem;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(53,32,79,0.07);box-shadow:0 2px 20px rgba(53,32,79,0.06);}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;}
.nav-logo img{height:62px;display:block;}
.nav-links{display:flex;align-items:center;gap:2rem;}
.nav-links a{font-size:0.67rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;
  color:rgba(35,29,45,0.5);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover,.nav-links a.active{color:var(--purple-royal);}
.nav-cta{padding:0.5rem 1.4rem;background:var(--gold);color:#231D2D!important;font-size:0.67rem;
  font-weight:900;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;
  border-radius:3px;transition:transform 0.2s,box-shadow 0.2s;}
.nav-cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,162,39,0.4);}
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;}
.nav-burger span{display:block;width:22px;height:2px;background:var(--purple-deep);}

/* PAGE HEADER */
.page-header{padding:8rem 2.5rem 4rem;
  background:linear-gradient(145deg,var(--purple-deep) 0%,#4A2B7A 45%,var(--teal) 100%);
  position:relative;overflow:hidden;}
.page-header-orb{position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,184,176,0.25) 0%,transparent 70%);
  top:-100px;right:-80px;pointer-events:none;}
.page-header-noise{position:absolute;inset:0;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;}
.page-header-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.page-eyebrow{font-size:0.58rem;font-weight:900;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(201,162,39,0.85);margin-bottom:0.7rem;}
.page-h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,5vw,3.6rem);
  font-weight:700;line-height:1.08;letter-spacing:-0.025em;color:#fff;margin-bottom:1rem;}
.page-h1 em{font-style:italic;color:#A8E6E3;}
.page-sub{font-size:1rem;color:rgba(255,255,255,0.62);max-width:520px;line-height:1.85;}

/* FILTER BAR */
.filter-bar{background:#FAF8FF;border-bottom:1px solid rgba(53,32,79,0.07);
  padding:1.5rem 2.5rem;position:sticky;top:68px;z-index:100;}
.filter-bar-inner{max-width:1200px;margin:0 auto;display:flex;gap:1rem;
  align-items:center;flex-wrap:wrap;}
.filter-tab{padding:0.55rem 1.25rem;border-radius:100px;font-size:0.68rem;
  font-weight:900;letter-spacing:0.12em;text-transform:uppercase;
  border:2px solid transparent;cursor:pointer;font-family:'Lato',sans-serif;
  transition:all 0.2s;background:#fff;color:rgba(35,29,45,0.5);}
.filter-tab:hover{color:var(--purple-royal);border-color:rgba(91,59,140,0.2);}
.filter-tab.active-all{background:var(--purple-deep);color:#fff;border-color:var(--purple-deep);}
.filter-tab.active-gatherings{background:var(--gold);color:#231D2D;border-color:var(--gold);}
.filter-tab.active-walks{background:var(--teal);color:#fff;border-color:var(--teal);}
.filter-tab.active-25k{background:var(--purple-royal);color:#fff;border-color:var(--purple-royal);}
.search-wrap{position:relative;margin-left:auto;}
.search-wrap input{padding:0.6rem 0.9rem 0.6rem 2.4rem;border:1.5px solid rgba(53,32,79,0.15);
  border-radius:5px;font-size:0.83rem;font-family:'Lato',sans-serif;outline:none;
  background:#fff;color:#231D2D;width:240px;transition:border-color 0.2s,box-shadow 0.2s;}
.search-wrap input:focus{border-color:var(--purple-royal);box-shadow:0 0 0 3px rgba(91,59,140,0.1);}
.search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);font-size:0.85rem;pointer-events:none;}

/* EVENTS MAIN */
.events-main{padding:4rem 2.5rem 6rem;min-height:60vh;}
.events-container{max-width:1200px;margin:0 auto;}

/* category section header */
.cat-section-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.75rem;margin-top:3.5rem;}
.cat-section-header:first-child{margin-top:0;}
.cat-pill{display:inline-flex;align-items:center;gap:0.5rem;padding:0.45rem 1.1rem;
  border-radius:100px;font-size:0.62rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;}
.cat-pill.gatherings{background:rgba(201,162,39,0.15);color:#8B6914;}
.cat-pill.weekly-walks{background:rgba(46,184,176,0.15);color:#1A7A76;}
.cat-pill.tk25-walk,.cat-pill[data-cat='25k-walk']{background:rgba(91,59,140,0.12);color:var(--purple-royal);}
.cat-divider{flex:1;height:1px;background:rgba(53,32,79,0.08);}

/* event card */
.ev-card{display:flex;align-items:stretch;background:#fff;
  border:1px solid rgba(53,32,79,0.08);border-radius:8px;overflow:hidden;
  margin-bottom:1rem;box-shadow:0 4px 20px rgba(53,32,79,0.05);
  text-decoration:none;
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1),box-shadow 0.25s;}
.ev-card:hover{transform:translateY(-4px);box-shadow:0 16px 50px rgba(53,32,79,0.12);}
.ev-date-col{flex:0 0 94px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1.4rem 0.75rem;min-height:100px;}
.ev-date-col.gatherings{background:linear-gradient(160deg,#8B6914,#C9A227);}
.ev-date-col.weekly-walks{background:linear-gradient(160deg,#1A7A76,#2EB8B0);}
.ev-date-col[data-cat='25k-walk']{background:linear-gradient(160deg,#35204F,#5B3B8C);}
.ev-mon{font-size:0.56rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;}
.ev-date-col.gatherings .ev-mon{color:rgba(255,255,200,0.85);}
.ev-date-col.weekly-walks .ev-mon{color:rgba(200,255,250,0.85);}
.ev-date-col[data-cat='25k-walk'] .ev-mon{color:rgba(220,200,255,0.85);}
.ev-day{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;
  color:#fff;line-height:1;}
.ev-dname{font-size:0.52rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);}
.ev-body{flex:1;padding:1.4rem 1.75rem;}
.ev-cost-badge{display:inline-block;font-size:0.56rem;font-weight:900;letter-spacing:0.15em;
  text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:100px;
  background:rgba(46,184,176,0.12);color:#1A7A76;margin-bottom:0.4rem;}
.ev-cost-badge.paid{background:rgba(201,162,39,0.15);color:#8B6914;}
.ev-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;
  color:var(--purple-deep);margin-bottom:0.35rem;}
.ev-meta{font-size:0.75rem;color:rgba(35,29,45,0.46);margin-bottom:0.45rem;}
.ev-desc{font-size:0.82rem;color:rgba(35,29,45,0.5);line-height:1.7;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ev-cta-col{flex:0 0 auto;padding:1.4rem 1.75rem;display:flex;align-items:center;}
.ev-view-btn{display:inline-block;padding:0.6rem 1.3rem;background:var(--purple-royal);
  color:#fff;font-size:0.65rem;font-weight:900;letter-spacing:0.12em;text-transform:uppercase;
  border-radius:3px;text-decoration:none;white-space:nowrap;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;}
.ev-view-btn:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 22px rgba(91,59,140,0.4);}
.ev-view-btn.gold{background:var(--gold);color:#231D2D;}
.ev-view-btn.teal{background:var(--teal);}

/* empty / count */
.results-count{font-size:0.72rem;font-weight:700;color:rgba(35,29,45,0.38);
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2rem;}
.empty-state{text-align:center;padding:5rem 2rem;}
.empty-icon{font-size:3.5rem;margin-bottom:1.25rem;}
.empty-h{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--purple-deep);margin-bottom:0.6rem;}
.empty-p{font-size:0.9rem;color:rgba(35,29,45,0.45);line-height:1.8;}

/* EVENT DETAIL MODAL / OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(22,10,40,0.7);z-index:500;
  display:none;align-items:flex-start;justify-content:center;
  padding:2rem 1.5rem;overflow-y:auto;backdrop-filter:blur(8px);}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:12px;max-width:720px;width:100%;
  box-shadow:0 40px 100px rgba(0,0,0,0.4);position:relative;overflow:hidden;
  margin:auto;}
.modal-header{padding:2.5rem 2.5rem 1.5rem;position:relative;}
.modal-cat-bar{height:4px;position:absolute;top:0;left:0;right:0;}
.modal-cat-bar.gatherings{background:linear-gradient(to right,#8B6914,#C9A227);}
.modal-cat-bar.weekly-walks{background:linear-gradient(to right,#1A7A76,#2EB8B0);}
.modal-cat-bar[data-cat='25k-walk']{background:linear-gradient(to right,#35204F,#5B3B8C);}
.modal-close{position:absolute;top:1.25rem;right:1.5rem;background:none;border:none;
  font-size:1.5rem;cursor:pointer;color:rgba(35,29,45,0.35);line-height:1;
  transition:color 0.2s;}
.modal-close:hover{color:var(--purple-deep);}
.modal-eyebrow{font-size:0.58rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;
  margin-bottom:0.5rem;}
.modal-eyebrow.gatherings{color:#8B6914;}
.modal-eyebrow.weekly-walks{color:#1A7A76;}
.modal-eyebrow[data-cat='25k-walk']{color:var(--purple-royal);}
.modal-title{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2.1rem);
  font-weight:700;color:var(--purple-deep);margin-bottom:1.25rem;line-height:1.2;}
.modal-meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;
  margin-bottom:1.5rem;}
.modal-meta-item{background:#FAF8FF;border-radius:6px;padding:0.85rem 1rem;}
.modal-meta-icon{font-size:1.1rem;margin-bottom:0.2rem;display:block;}
.modal-meta-label{font-size:0.56rem;font-weight:900;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(35,29,45,0.35);margin-bottom:0.15rem;}
.modal-meta-val{font-size:0.82rem;font-weight:700;color:var(--purple-deep);}
.modal-body{padding:0 2.5rem 2.5rem;}
.modal-section{margin-bottom:1.75rem;}
.modal-section-title{font-size:0.65rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--teal);margin-bottom:0.75rem;}
.modal-desc{font-size:0.92rem;color:rgba(35,29,45,0.62);line-height:1.85;}
.modal-list{list-style:none;display:flex;flex-direction:column;gap:0.55rem;}
.modal-list li{display:flex;align-items:flex-start;gap:0.6rem;
  font-size:0.88rem;color:rgba(35,29,45,0.65);line-height:1.6;}
.modal-list li::before{content:'✓';font-size:0.7rem;font-weight:900;
  color:var(--teal);margin-top:0.15rem;flex-shrink:0;}
/* ── RSVP STEPS ── */
.modal-steps{display:flex;flex-direction:column;gap:0;margin-bottom:1.75rem;}
.modal-step{display:flex;gap:1rem;align-items:flex-start;position:relative;padding-bottom:1.4rem;}
.modal-step:last-child{padding-bottom:0;}
.modal-step::before{content:'';position:absolute;left:18px;top:40px;bottom:0;width:2px;
  background:rgba(53,32,79,0.1);}
.modal-step:last-child::before{display:none;}
.modal-step-num{flex:0 0 38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:0.75rem;font-weight:900;color:#fff;flex-shrink:0;
  position:relative;z-index:1;}
.modal-step-num.s1{background:linear-gradient(135deg,#1A7A76,#2EB8B0);}
.modal-step-num.s2{background:linear-gradient(135deg,#7A5A12,#C9A227);}
.modal-step-num.s3{background:linear-gradient(135deg,#35204F,#5B3B8C);}
.modal-step-body{flex:1;padding-top:0.25rem;}
.modal-step-title{font-size:0.8rem;font-weight:900;color:var(--purple-deep);margin-bottom:0.2rem;
  letter-spacing:0.02em;}
.modal-step-text{font-size:0.82rem;color:rgba(35,29,45,0.58);line-height:1.65;}
/* pay buttons inside step */
.modal-pay-btns{display:flex;gap:0.6rem;flex-wrap:wrap;margin-top:0.75rem;}
.modal-pay-btn{display:inline-flex;align-items:center;gap:0.45rem;padding:0.65rem 1.25rem;
  border-radius:4px;font-size:0.68rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;
  text-decoration:none;transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;border:none;cursor:pointer;}
.modal-pay-btn.cashapp{background:#00D632;color:#fff;}
.modal-pay-btn.cashapp:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,214,50,0.4);}
.modal-pay-btn.paypal{background:#003087;color:#fff;}
.modal-pay-btn.paypal:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,48,135,0.4);}
.modal-pay-btn.disabled{background:rgba(35,29,45,0.1);color:rgba(35,29,45,0.38);cursor:not-allowed;}
/* RSVP bar at bottom of modal */
.modal-rsvp-bar{padding:1.25rem 2.5rem 1.5rem;border-top:1px solid rgba(53,32,79,0.08);
  background:#FAFAFE;}
.modal-rsvp-hint{font-size:0.75rem;color:rgba(35,29,45,0.42);line-height:1.5;margin-bottom:1rem;}
.modal-rsvp-hint strong{display:block;font-size:0.82rem;color:var(--purple-deep);margin-bottom:0.15rem;}
/* two-button row for paid events */
.modal-rsvp-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.65rem;}
.modal-rsvp-btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;
  padding:0.85rem 1rem;border-radius:5px;font-size:0.68rem;font-weight:900;
  letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;border:none;
  cursor:pointer;text-align:center;line-height:1.3;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;}
.modal-rsvp-btn .btn-sub{display:block;font-size:0.58rem;font-weight:400;
  opacity:0.72;letter-spacing:0.04em;text-transform:none;margin-top:0.15rem;}
.modal-rsvp-btn.pay-btn{background:var(--gold);color:#231D2D;
  box-shadow:0 6px 20px rgba(201,162,39,0.35);}
.modal-rsvp-btn.pay-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 30px rgba(201,162,39,0.5);}
.modal-rsvp-btn.rsvp-btn{background:var(--purple-royal);color:#fff;
  box-shadow:0 6px 20px rgba(91,59,140,0.3);}
.modal-rsvp-btn.rsvp-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 30px rgba(91,59,140,0.45);}
/* single free button */
.modal-rsvp-btn.free-btn{background:var(--teal);color:#fff;width:100%;
  box-shadow:0 6px 20px rgba(46,184,176,0.35);}
.modal-rsvp-btn.free-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 12px 30px rgba(46,184,176,0.5);}
.modal-payment{background:linear-gradient(145deg,#EDE4F8,#E6F7F6);border-radius:8px;
  padding:1.5rem;margin-bottom:1.75rem;}
.modal-payment-note{font-size:0.85rem;color:var(--purple-deep);font-weight:700;margin-bottom:1rem;}

footer{background:#1A0F2E;padding:3rem 2.5rem;}
.footer-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:1.5rem;}
.footer-brand img{height:38px;}
.footer-copy{font-size:0.7rem;color:rgba(255,255,255,0.22);}
.footer-links{display:flex;gap:1.5rem;}
.footer-links a{font-size:0.7rem;color:rgba(255,255,255,0.32);text-decoration:none;transition:color 0.2s;}
.footer-links a:hover{color:#fff;}

@media(max-width:860px){
  .modal{max-width:94vw;}
  .modal-rsvp-btns{grid-template-columns:1fr;}
}
@media(max-width:600px){
  nav{padding:0.75rem 1.25rem;}
  .nav-links{display:none;}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;
    top:72px;left:0;right:0;background:rgba(255,255,255,0.99);
    padding:1.5rem 1.5rem;gap:1.1rem;z-index:299;box-shadow:0 12px 40px rgba(0,0,0,0.1);}
  .nav-links a{font-size:0.78rem;}
  .nav-burger{display:flex;}
  .page-header{padding:6rem 1.25rem 3rem;}
  .filter-bar{padding:1rem 1.25rem;}
  .filter-bar-inner{gap:0.5rem;}
  .filter-tab{padding:0.45rem 0.85rem;font-size:0.6rem;}
  .search-wrap{margin-left:0;width:100%;}
  .search-wrap input{width:100%;}
  .events-main{padding:2.5rem 1.25rem 4rem;}
  .ev-card{flex-wrap:wrap;}
  .ev-date-col{flex:0 0 100%;flex-direction:row;min-height:auto;padding:0.75rem 1.25rem;gap:0.75rem;
    border-radius:0;}
  .ev-body{padding:1rem 1.25rem;}
  .ev-cta-col{padding:0.75rem 1.25rem 1.25rem;width:100%;}
  .ev-view-btn{display:block;text-align:center;width:100%;}
  .modal-header{padding:2rem 1.25rem 1.25rem;}
  .modal-body{padding:0 1.25rem 1.5rem;}
  .modal-rsvp-bar{padding:1.1rem 1.25rem 1.25rem;}
  .modal-meta-grid{grid-template-columns:1fr 1fr;}
  .modal-rsvp-btns{grid-template-columns:1fr;}
  .modal-pay-btns{flex-direction:column;}
  .modal-pay-btn{justify-content:center;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html"><img src="assets/gin-logo.png" alt="Go Inspire Now" style="height:62px;display:block;"></a>
    <div class="nav-links" id="nav-links">
      <a href="events.html" class="active">Events</a>
      <a href="index.html#podcast">Podcast</a>
      <a href="products.html">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="index.html#donate" class="nav-cta">Donate</a>
    </div>
    <button class="nav-burger" id="nav-burger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-noise"></div>
  <div class="page-header-orb"></div>
  <div class="page-header-inner">
    <p class="page-eyebrow">Go Inspire Now</p>
    <h1 class="page-h1">All <em>Events</em></h1>
    <p class="page-sub">Gatherings, Weekly Walks, and 25K events — find yours, RSVP, and show up ready to be inspired.</p>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <button class="filter-tab active-all" data-filter="all">All Events</button>
    <button class="filter-tab" data-filter="gatherings">🥂 Gatherings</button>
    <button class="filter-tab" data-filter="weekly-walks">🚶‍♀️ Weekly Walks</button>
    <button class="filter-tab" data-filter="25k-walk">🏆 25K Walk</button>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search events…" autocomplete="off">
    </div>
  </div>
</div>

<div class="events-main">
  <div class="events-container">
    <div class="results-count" id="results-count"></div>
    <div id="events-list"></div>
  </div>
</div>

<!-- EVENT DETAIL OVERLAY -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-cat-bar" id="modal-cat-bar"></div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <p class="modal-eyebrow" id="modal-eyebrow"></p>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-meta-grid" id="modal-meta"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-rsvp-bar" id="modal-rsvp-bar"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <a href="index.html"><img src="assets/gin-logo.png" alt="Go Inspire Now" style="height:38px;display:block;"></a>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="index.html#donate">Donate</a>
    </div>
    <p class="footer-copy">© 2026 Go Inspire Now</p>
  </div>
</footer>

<script>
document.getElementById('nav-burger').addEventListener('click', () =>
  document.getElementById('nav-links').classList.toggle('open'));

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAT_LABEL = {'gatherings':'Gatherings','weekly-walks':'Weekly Walk','25k-walk':'25K Walk'};
const CAT_EMOJI = {'gatherings':'🥂','weekly-walks':'🚶‍♀️','25k-walk':'🏆'};

const events = (window.GIN_EVENTS || []).map(e => ({
  ...e, dateObj: new Date(e.date + 'T08:00:00')
})).sort((a,b) => a.dateObj - b.dateObj);

let activeFilter = 'all';
let searchQuery  = '';

// pre-fill search from URL
const urlQ = new URLSearchParams(window.location.search).get('q') || '';
if(urlQ){ document.getElementById('search-input').value = urlQ; searchQuery = urlQ.toLowerCase(); }

// pre-select filter from hash
const hash = window.location.hash.replace('#','');
if(['gatherings','weekly-walks','25k-walk'].includes(hash)){
  activeFilter = hash;
  document.querySelectorAll('.filter-tab').forEach(t => {
    t.classList.remove('active-all','active-gatherings','active-walks','active-25k');
    if(t.dataset.filter === hash) t.classList.add('active-'+({gatherings:'gatherings','weekly-walks':'walks','25k-walk':'25k'}[hash]));
  });
}

function renderEvents(){
  const now = new Date();
  let filtered = events;
  if(activeFilter !== 'all') filtered = filtered.filter(e => e.category === activeFilter);
  if(searchQuery) filtered = filtered.filter(e =>
    (e.title+' '+e.city+' '+(e.description||'')).toLowerCase().includes(searchQuery));

  const count = document.getElementById('results-count');
  count.textContent = filtered.length + ' event' + (filtered.length!==1?'s':'') + (activeFilter!=='all'?' in '+CAT_LABEL[activeFilter]:'');

  if(!filtered.length){
    document.getElementById('events-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📅</div>
        <h3 class="empty-h">No events found</h3>
        <p class="empty-p">${searchQuery ? `No results for "${searchQuery}". Try a different search.` : 'No events in this category yet — check back soon!'}</p>
      </div>`;
    return;
  }

  // group by category if showing all, else flat list
  let html = '';
  if(activeFilter === 'all'){
    const groups = {'gatherings':[],'weekly-walks':[],'25k-walk':[]};
    filtered.forEach(e => { if(groups[e.category]) groups[e.category].push(e); });
    Object.entries(groups).forEach(([cat, evs]) => {
      if(!evs.length) return;
      html += `<div id="${cat}">
        <div class="cat-section-header">
          <span class="cat-pill ${cat}" data-cat="${cat}">${CAT_EMOJI[cat]} ${CAT_LABEL[cat]}</span>
          <div class="cat-divider"></div>
        </div>
        ${evs.map(e => eventCard(e)).join('')}
      </div>`;
    });
  } else {
    html = filtered.map(e => eventCard(e)).join('');
  }
  document.getElementById('events-list').innerHTML = html;

  // attach click handlers
  document.querySelectorAll('[data-ev-id]').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      const ev = events.find(x => x.id === el.dataset.evId);
      if(ev) openModal(ev);
    });
  });
}

function eventCard(ev){
  const d = ev.dateObj;
  const btnClass = ev.category==='gatherings'?'gold':ev.category==='weekly-walks'?'teal':'';
  return `<a href="#" class="ev-card" data-ev-id="${ev.id}" id="${ev.id}">
    <div class="ev-date-col ${ev.category}" data-cat="${ev.category}">
      <span class="ev-mon">${MONTHS_SHORT[d.getMonth()]}</span>
      <span class="ev-day">${d.getDate()}</span>
      <span class="ev-dname">${DAYS[d.getDay()].slice(0,3)}</span>
    </div>
    <div class="ev-body">
      ${ev.cost>0 ? `<span class="ev-cost-badge paid">$${ev.cost} to attend</span>` : `<span class="ev-cost-badge">Free</span>`}
      <div class="ev-title">${ev.title}</div>
      <div class="ev-meta">📍 ${ev.city} &nbsp;·&nbsp; 🕐 ${ev.time}${ev.endTime?' – '+ev.endTime:''}</div>
      <div class="ev-desc">${ev.shortDesc}</div>
    </div>
    <div class="ev-cta-col">
      <span class="ev-view-btn ${btnClass}">View Details →</span>
    </div>
  </a>`;
}

// ── MODAL ────────────────────────────────────────────────────
const overlay   = document.getElementById('overlay');
const modalClose = document.getElementById('modal-close');

function openModal(ev){
  const d = ev.dateObj;
  const cfg = window.GIN_CONFIG || {};

  // header
  document.getElementById('modal-cat-bar').className = 'modal-cat-bar ' + ev.category;
  document.getElementById('modal-cat-bar').dataset.cat = ev.category;
  const eyebrow = document.getElementById('modal-eyebrow');
  eyebrow.className = 'modal-eyebrow ' + ev.category;
  eyebrow.dataset.cat = ev.category;
  eyebrow.textContent = CAT_EMOJI[ev.category] + ' ' + CAT_LABEL[ev.category];
  document.getElementById('modal-title').textContent = ev.title;

  // meta grid
  document.getElementById('modal-meta').innerHTML = `
    <div class="modal-meta-item"><span class="modal-meta-icon">📅</span><div class="modal-meta-label">Date</div><div class="modal-meta-val">${DAYS[d.getDay()]}, ${MONTHS_LONG[d.getMonth()]} ${d.getDate()}</div></div>
    <div class="modal-meta-item"><span class="modal-meta-icon">🕐</span><div class="modal-meta-label">Time</div><div class="modal-meta-val">${ev.time}${ev.endTime?' – '+ev.endTime:''}</div></div>
    <div class="modal-meta-item"><span class="modal-meta-icon">📍</span><div class="modal-meta-label">Location</div><div class="modal-meta-val">${ev.location}</div></div>`;

  // ── YOUR NEXT STEPS (per category) ──
  const caLink  = cfg.CASHAPP_URL || '';
  const ppLink  = cfg.PAYPAL_URL  || '';
  const ghlLink = cfg.GHL_RSVP_URL || '';

  let stepsHtml = '';
  if(ev.category === 'weekly-walks'){
    stepsHtml = `
      <div class="modal-step">
        <div class="modal-step-num s1">1</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Pay $${ev.cost} to Reserve Your Spot</div>
          <p class="modal-step-text">Spots are limited — use Cash App or PayPal to secure your place. Once paid, come back and complete step 2.</p>
          <div class="modal-pay-btns">
            <a href="${caLink||'#'}" class="modal-pay-btn cashapp${!caLink?' disabled':''}" ${caLink?'target="_blank" rel="noopener"':'onclick="alert(\'Cash App link coming soon!\');return false;"'}>
              💚 Pay via Cash App
            </a>
            <a href="${ppLink||'#'}" class="modal-pay-btn paypal${!ppLink?' disabled':''}" ${ppLink?'target="_blank" rel="noopener"':'onclick="alert(\'PayPal link coming soon!\');return false;"'}>
              🔵 Pay via PayPal
            </a>
          </div>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s2">2</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Complete Your RSVP</div>
          <p class="modal-step-text">Already paid? Hit the button below to officially register — enter your name and email so we have you on the list and can send event reminders.</p>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s3">3</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Show Up Ready to Walk</div>
          <p class="modal-step-text">We meet at <strong>${ev.location}</strong> in ${ev.city} at <strong>${ev.time}</strong>. Wear comfy shoes, bring water, and come with an open heart.</p>
        </div>
      </div>`;
  } else if(ev.category === 'gatherings'){
    stepsHtml = `
      <div class="modal-step">
        <div class="modal-step-num s1">1</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Save the Date — It's Free!</div>
          <p class="modal-step-text">This event is completely free to attend. Add it to your calendar so you don't miss it: <strong>${DAYS[d.getDay()]}, ${MONTHS_LONG[d.getMonth()]} ${d.getDate()}</strong> at ${ev.time}.</p>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s2">2</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Get There — Know Your Location</div>
          <p class="modal-step-text">We're meeting at <strong>${ev.location}</strong> in ${ev.city}. Dress comfortably, bring a friend, and plan to arrive a few minutes early.</p>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s3">3</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Show Up &amp; Be Celebrated</div>
          <p class="modal-step-text">Come as you are. Every woman in the room is there for the same reason — connection, community, and encouragement. You belong here.</p>
        </div>
      </div>`;
  } else {
    // 25K Walk
    stepsHtml = `
      <div class="modal-step">
        <div class="modal-step-num s1">1</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Register — Free Entry!</div>
          <p class="modal-step-text">The 25K Walk is free to enter. Click RSVP below to add your name to the roster so we can plan for your arrival and cheer you on at the finish line.</p>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s2">2</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Train &amp; Prepare</div>
          <p class="modal-step-text">15.5 miles is a big achievement — start walking 3–4 times a week in the weeks leading up to the event. Review the prep guide below and wear broken-in shoes on race day.</p>
        </div>
      </div>
      <div class="modal-step">
        <div class="modal-step-num s3">3</div>
        <div class="modal-step-body">
          <div class="modal-step-title">Show Up Race Day Ready</div>
          <p class="modal-step-text">Meet us at <strong>${ev.location}</strong> in ${ev.city} at <strong>${ev.time}</strong>. Aid stations are along the route, and a finish-line celebration is waiting for you at the end.</p>
        </div>
      </div>`;
  }

  // ── BODY ──
  let bodyHtml = `
    <div class="modal-section">
      <div class="modal-section-title">Your Next Steps</div>
      <div class="modal-steps">${stepsHtml}</div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">About This Event</div>
      <p class="modal-desc">${ev.description}</p>
    </div>`;

  if(ev.whatToExpect && ev.whatToExpect.length){
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title">What to Expect</div>
      <ul class="modal-list">${ev.whatToExpect.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`;
  }

  if(ev.howToPrep && ev.howToPrep.length){
    bodyHtml += `<div class="modal-section">
      <div class="modal-section-title">How to Prepare</div>
      <ul class="modal-list">${ev.howToPrep.map(i=>`<li>${i}</li>`).join('')}</ul>
    </div>`;
  }

  // ── RSVP BAR ──
  let rsvpBarHtml = '';
  if(ev.cost > 0){
    // Two buttons: Pay first, then RSVP after paying
    const payHref  = caLink || ppLink || '#';
    const payClick = (caLink||ppLink) ? '' : `onclick="alert('Payment link coming soon — check back shortly!');return false;"`;
    const ghlHref  = ghlLink || '#';
    const ghlClick = ghlLink ? '' : `onclick="alert('RSVP form coming soon — once you pay, we will add you to the list!');return false;"`;
    rsvpBarHtml = `
      <div class="modal-rsvp-hint">
        <strong>Two quick steps to join this walk:</strong>
        Pay $${ev.cost} first, then complete your RSVP so we have you on the list.
      </div>
      <div class="modal-rsvp-btns">
        <a href="${payHref}" class="modal-rsvp-btn pay-btn" target="_blank" rel="noopener" ${payClick}>
          💳 Pay $${ev.cost} to Reserve
          <span class="btn-sub">Step 1 — Cash App or PayPal</span>
        </a>
        <a href="${ghlHref}" class="modal-rsvp-btn rsvp-btn" target="_blank" rel="noopener" ${ghlClick}>
          ✅ I Already Paid — RSVP
          <span class="btn-sub">Step 2 — Enter your info</span>
        </a>
      </div>`;
  } else {
    // Free event — single RSVP button
    const ghlHref  = ghlLink || '#';
    const ghlClick = ghlLink ? '' : `onclick="alert('RSVP link coming soon!');return false;"`;
    rsvpBarHtml = `
      <div class="modal-rsvp-hint">
        <strong>It's free — save your spot!</strong>
        ${DAYS[d.getDay()]}, ${MONTHS_LONG[d.getMonth()]} ${d.getDate()} · ${ev.time}
      </div>
      <a href="${ghlHref}" class="modal-rsvp-btn free-btn" target="_blank" rel="noopener" ${ghlClick}>
        ✅ RSVP — Save My Spot
      </a>`;
  }

  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-rsvp-bar').innerHTML = rsvpBarHtml;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  window.history.replaceState(null,'','#'+ev.id);
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  window.history.replaceState(null,'','events.html');
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── FILTER TABS ───────────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeFilter = tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('active-all','active-gatherings','active-walks','active-25k');
    });
    const classMap = {all:'all',gatherings:'gatherings','weekly-walks':'walks','25k-walk':'25k'};
    tab.classList.add('active-' + classMap[activeFilter]);
    renderEvents();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  renderEvents();
});

// open modal from URL hash
function checkHashForModal(){
  const h = window.location.hash.replace('#','');
  if(h && !['gatherings','weekly-walks','25k-walk'].includes(h)){
    const ev = events.find(x => x.id === h);
    if(ev) setTimeout(() => openModal(ev), 300);
  }
}

renderEvents();
checkHashForModal();
</script>
</body>
</html>
